# ═══════════════════════════════════════════════════════════════════
# Build verification — catches "forgot to rebuild logbook.html" PRs.
#
# The repo currently commits the built logbook.html alongside src/. Any
# PR that changes src/ without rerunning `node build.js` will leave the
# built artefact out of sync with the source, and Cloudflare Pages will
# serve the stale bundle. This workflow runs the build in --check mode,
# which rebuilds into logbook.built.html and asserts it's byte-identical
# to the committed logbook.html. If it isn't, the check fails and the PR
# is blocked until the contributor commits the rebuild.
#
# It also runs the front-end smoke test (test/smoke.mjs), which loads the
# built app in a headless DOM and visits every page — this is the net that
# catches blank-screen bugs like the shipped showPage('dash').
#
# Skipped when the only changed files are documentation, the worker
# project, the LICENSE, or the .github workflow itself — none of which
# affect the logbook.html build.
# ═══════════════════════════════════════════════════════════════════
name: Build check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.js'
      - 'logbook.html'
      - 'package.json'
      - 'package-lock.json'
      - 'test/**'
      - '.github/workflows/build-check.yml'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.js'
      - 'logbook.html'
      - 'package.json'
      - 'package-lock.json'
      - 'test/**'

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dev dependencies (jsdom for the smoke test)
        run: npm ci

      - name: Verify logbook.html matches src/
        run: node build.js --check

      - name: Smoke test — boot the app and visit every page
        run: npm test
