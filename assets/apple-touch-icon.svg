<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Cumulo">
  <!--
    iOS App Icon — per brand essential H:
    "Flat 1024x1024 PNG, full-bleed #0F2A5C. 90° corners.
     Cloud ≤60% width. Nudge +2% upward."
    iOS applies its own mask if needed, so the rect uses 90° corners.
    Cloud width = 400 (39% of 1024 — well within ≤60%).
    Horizon width = 560 (55% of 1024).
    Mark vertically centered ~20px above geometric center (2% nudge upward).
  -->
  <rect width="1024" height="1024" fill="#0F2A5C"/>
  <path fill="#FFFFFF" fill-rule="evenodd" d="M312 578 C312 410 380 338 512 338 C644 338 712 410 712 578 L312 578 Z M232 618 H792 V646 H232 Z"/>
</svg>
